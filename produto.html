<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="description" content="Produto DUUM com compra segura, tamanhos disponiveis e avaliacoes de clientes.">
  <link rel="canonical" href="https://duum-store.vercel.app/produto.html">
  <meta property="og:title" content="Produto DUUM">
  <meta property="og:description" content="Veja detalhes, tamanhos e avaliacoes antes de comprar na DUUM.">
  <title>Produto | DUUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="topbar">Produto DUUM com compra segura</div>
  <header class="header">
    <a class="logo" href="index.html">DUUM<span>CURATED WEAR</span></a>
    <a class="back-link" href="index.html">Voltar a loja</a>
  </header>
  <main>
    <section class="product-page" id="productPage">
      <p class="checkout-status">Carregando produto...</p>
    </section>
    <section class="product-reviews" id="reviewsBox" hidden>
      <div class="section-heading">
        <div>
          <span class="eyebrow">AVALIACOES</span>
          <h2>O que clientes acharam</h2>
        </div>
        <strong id="reviewSummary">0.0/5</strong>
      </div>
      <div class="reviews-layout">
        <form class="review-form" id="reviewForm">
          <input type="hidden" name="product_id" id="reviewProductId">
          <input name="customer_name" id="reviewName" maxlength="100" placeholder="Seu nome" required>
          <input name="customer_email" id="reviewEmail" type="email" maxlength="160" placeholder="Seu e-mail">
          <select name="rating" required>
            <option value="5">5 estrelas</option>
            <option value="4">4 estrelas</option>
            <option value="3">3 estrelas</option>
            <option value="2">2 estrelas</option>
            <option value="1">1 estrela</option>
          </select>
          <textarea name="comment" maxlength="600" placeholder="Conte como foi sua experiencia"></textarea>
          <button class="checkout-btn" type="submit">Enviar avaliacao</button>
          <small id="reviewStatus" class="checkout-status" aria-live="polite"></small>
        </form>
        <div class="review-list" id="reviewList"></div>
      </div>
    </section>
  </main>
  <script src="assets/product.js?v=seo-observability" defer></script>
</body>
</html>
