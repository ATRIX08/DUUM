<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Acompanhar pedido | DUUM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="topbar">Acompanhe seu pedido DUUM</div>
  <header class="header">
    <a class="logo" href="index.html">DUUM<span>CURATED WEAR</span></a>
    <a class="back-link" href="index.html">Voltar a loja</a>
  </header>

  <main class="checkout-page">
    <section class="checkout-box">
      <span class="eyebrow">STATUS</span>
      <h1>Acompanhar pedido</h1>
      <p class="summary-note">Digite o codigo do pedido. Se quiser mais seguranca, informe tambem o e-mail usado na compra.</p>
      <form id="orderForm">
        <label for="orderId">Codigo do pedido</label>
        <input id="orderId" maxlength="80" required>
        <label for="orderEmail">E-mail da compra</label>
        <input id="orderEmail" type="email" maxlength="160">
        <button class="checkout-btn" type="submit">Consultar</button>
      </form>
      <p class="checkout-status" id="orderStatus" aria-live="polite"></p>
    </section>

    <aside class="checkout-box checkout-summary">
      <h2>Pedido</h2>
      <div id="orderResult"><p class="summary-note">O status aparecera aqui.</p></div>
      <div id="customerOrders"></div>
    </aside>
  </main>

  <script>
    const money = value => Number(value || 0).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    const params = new URLSearchParams(window.location.search);
    const orderInput = document.querySelector('#orderId');
    const status = document.querySelector('#orderStatus');
    const result = document.querySelector('#orderResult');
    orderInput.value = params.get('id') || localStorage.getItem('duum_last_order') || '';
    if (params.get('email')) document.querySelector('#orderEmail').value = params.get('email');

    function label(value) {
      return {
        pending_payment: 'Aguardando pagamento',
        pending: 'Pendente',
        approved: 'Aprovado',
        rejected: 'Recusado',
        paid: 'Pagamento aprovado',
        preparing: 'Pedido em separacao',
        shipped: 'Pedido enviado',
        delivered: 'Pedido entregue',
        cancelled: 'Pedido cancelado',
        payment_rejected: 'Pagamento recusado'
      }[value] || value;
    }

    async function lookup(event) {
      if (event) event.preventDefault();
      const id = orderInput.value.trim();
      const email = document.querySelector('#orderEmail').value.trim();
      if (!id) return;
      status.textContent = 'Consultando pedido...';
      status.className = 'checkout-status';
      try {
        const query = new URLSearchParams({ id });
        if (email) query.set('email', email);
        const response = await fetch(`/api/order?${query.toString()}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Pedido nao encontrado.');
        const order = data.order;
        const needsPayment = ['pending_payment', 'payment_rejected'].includes(order.status) || ['pending', 'rejected'].includes(order.payment_status);
        status.textContent = label(order.status);
        status.className = `checkout-status ${needsPayment ? 'pending' : 'success'}`;
        result.innerHTML = `
          <div class="order-timeline compact">
            <span class="active">Pedido criado</span>
            <span class="${['paid','preparing','shipped','delivered'].includes(order.status) ? 'active' : ''}">Pagamento</span>
            <span class="${['shipped','delivered'].includes(order.status) ? 'active' : ''}">Envio</span>
            <span class="${order.status === 'delivered' ? 'active' : ''}">Entrega</span>
          </div>
          ${needsPayment ? `
            <div class="payment-alert">
              <strong>Ainda nao efetuou o pagamento</strong>
              <span>Seu pedido esta reservado, mas o pagamento ainda nao foi confirmado.</span>
              ${order.checkout_url ? `<a class="checkout-btn" href="${order.checkout_url}" rel="noopener noreferrer">Pagar agora</a>` : '<small>Link de pagamento indisponivel. Fale com o atendimento DUUM.</small>'}
            </div>
          ` : ''}
          <div class="summary-line"><span>Pedido</span><strong>${order.id}</strong></div>
          <div class="summary-line"><span>Status</span><strong>${label(order.status)}</strong></div>
          <div class="summary-line"><span>Pagamento</span><strong>${order.payment_status}</strong></div>
          <div class="summary-line"><span>Transportadora</span><strong>${order.carrier || '-'}</strong></div>
          <div class="summary-line"><span>Rastreio</span><strong>${order.tracking_code || '-'}</strong></div>
          <div class="summary-line"><span>Frete</span><strong>${money(order.shipping_fee)}</strong></div>
          ${Number(order.discount_amount || 0) > 0 ? `<div class="summary-line"><span>Cupom ${order.discount_code}</span><strong>- ${money(order.discount_amount)}</strong></div>` : ''}
          <div class="summary-line total-line"><span>Total</span><strong>${money(order.total_amount)}</strong></div>
          ${order.items.map(item => `<div class="summary-line"><span>${item.product_name}${item.size ? ` - Tam. ${item.size}` : ''} x ${item.quantity}</span><span>${money(item.total_price)}</span></div>`).join('')}
        `;
      } catch (error) {
        status.textContent = error.message;
        status.className = 'checkout-status failure';
      }
    }

    document.querySelector('#orderForm').addEventListener('submit', lookup);
    if (orderInput.value) lookup();

    async function loadCustomerOrders() {
      const email = document.querySelector('#orderEmail').value.trim() || params.get('email');
      if (!email) return;
      const wrap = document.querySelector('#customerOrders');
      wrap.innerHTML = '<h3>Minhas compras</h3><p class="summary-note">Carregando historico...</p>';
      try {
        const response = await fetch(`/api/customer-orders?email=${encodeURIComponent(email)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Nao foi possivel carregar pedidos.');
        wrap.innerHTML = `<h3>Minhas compras</h3>${(data.orders || []).map(order => `
          <a class="order-card" href="pedido.html?id=${encodeURIComponent(order.id)}&email=${encodeURIComponent(email)}">
            <strong>${order.id}</strong>
            <span>${label(order.status)} - ${money(order.total_amount)}</span>
            <small>${order.tracking_code ? `Rastreio: ${order.tracking_code}` : `${order.item_count || 0} item(ns)`}</small>
          </a>`).join('') || '<p class="summary-note">Nenhuma compra encontrada para este e-mail.</p>'}`;
      } catch (error) {
        wrap.innerHTML = `<h3>Minhas compras</h3><p class="checkout-status failure">${error.message}</p>`;
      }
    }
    loadCustomerOrders();
  </script>
</body>
</html>
